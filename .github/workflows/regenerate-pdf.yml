name: Regenerate Downloadable PDF

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate-pdf:
    # Prevent workflow loops when committing from the action itself.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Generate PDF
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: npm run generate-pdf

      - name: Commit updated PDF if changed
        run: |
          if git diff --quiet -- downloads; then
            echo "No PDF changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads
          git commit -m "chore: regenerate downloadable PDF [skip ci]"
          git push
